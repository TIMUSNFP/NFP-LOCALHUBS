<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFP Circles — Pin Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0b1a;color:#e0dff0;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Header ── */
.hdr{background:#181530;border-bottom:1px solid rgba(255,255,255,.1);padding:10px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.hdr-title{font-size:16px;font-weight:700}
.hdr-title span{color:#E05B25}
.hdr-status{flex:1;font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);color:rgba(255,255,255,.6);transition:all .3s}
.hdr-status.ok{color:#4ade80;border-color:#4ade80;background:rgba(74,222,128,.08)}
.hdr-status.err{color:#f87171;border-color:#f87171;background:rgba(248,113,113,.08)}
.hdr-status.busy{color:#fbbf24;border-color:#fbbf24;background:rgba(251,191,36,.08)}

/* ── Layout ── */
.body{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:260px;background:#181530;border-right:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-head h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.4);margin-bottom:2px}
.sb-head p{font-size:11px;color:rgba(255,255,255,.3)}
.city-list{flex:1;overflow-y:auto}
.city-item{padding:9px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:10px;transition:background .15s}
.city-item:hover{background:rgba(255,255,255,.05)}
.city-item.sel{background:rgba(224,91,37,.12);border-left:3px solid #E05B25}
.ci-dot{width:9px;height:9px;border-radius:50%;background:#3a3658;flex-shrink:0;transition:all .2s}
.city-item .ci-dot{background:#E05B25}
.city-item.sel .ci-dot{background:#ff8c5a;box-shadow:0 0 7px #E05B25}
.ci-name{font-size:13px;font-weight:500;flex:1}
.ci-coords{font-size:10px;color:rgba(255,255,255,.35);font-family:monospace;margin-top:1px}
.sb-foot{padding:12px 14px;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;gap:8px}
.btn-apply{background:#E05B25;color:#fff;border:none;padding:11px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s;width:100%}
.btn-apply:hover{opacity:.88}
.btn-apply:disabled{opacity:.35;cursor:not-allowed}
.btn-reset{background:transparent;color:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.12);padding:8px;border-radius:8px;font-size:12px;cursor:pointer;width:100%;transition:all .2s}
.btn-reset:hover{border-color:rgba(255,255,255,.3);color:#fff}

/* ── Map area ── */
.map-area{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#0d0b1a;position:relative}
.map-wrap{position:relative;line-height:0;border-radius:4px;overflow:hidden}
.map-wrap img{display:block;max-height:calc(100vh - 68px);max-width:calc(100vw - 280px);width:auto;height:auto;user-select:none;-webkit-user-drag:none}
.map-wrap.mode-select{cursor:crosshair}

/* ── Pins layer ── */
#pins{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.pin{position:absolute;transform:translate(-50%,-50%)}
.pin-ring{position:absolute;width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(224,91,37,.4);top:50%;left:50%;transform:translate(-50%,-50%);animation:ring 2s infinite}
.pin-dot{width:10px;height:10px;border-radius:50%;background:#E05B25;border:2px solid rgba(255,255,255,.85);box-shadow:0 0 6px rgba(224,91,37,.7);position:relative;z-index:1}
.pin.sel .pin-dot{width:13px;height:13px;background:#ff8c5a;box-shadow:0 0 12px rgba(255,140,90,.9);animation:pulsepin 1s infinite}
.pin.sel .pin-ring{border-color:#ff8c5a;animation:ring .9s infinite}
.pin-lbl{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:600;color:#fff;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,.9);background:rgba(0,0,0,.55);padding:1px 5px;border-radius:3px;pointer-events:none}
.pin.lbl-left .pin-lbl{left:auto;right:12px}

/* ── Hover tooltip ── */
#tooltip{position:absolute;background:rgba(20,18,40,.92);color:#fff;font-size:11px;font-family:monospace;padding:4px 10px;border-radius:6px;border:1px solid rgba(224,91,37,.4);pointer-events:none;display:none;white-space:nowrap;z-index:10}

/* ── Instruction hint ── */
.hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.4);background:rgba(0,0,0,.45);padding:4px 14px;border-radius:14px;white-space:nowrap;pointer-events:none}

@keyframes ring{0%{transform:translate(-50%,-50%) scale(1);opacity:.6}100%{transform:translate(-50%,-50%) scale(2);opacity:0}}
@keyframes pulsepin{0%,100%{box-shadow:0 0 8px rgba(255,140,90,.9)}50%{box-shadow:0 0 18px rgba(255,140,90,.9),0 0 28px rgba(255,140,90,.4)}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">NFP Circles <span>Pin Editor</span></div>
  <div class="hdr-status" id="status">Select a city from the list, then click its location on the map</div>
</div>

<div class="body">
  <aside class="sidebar">
    <div class="sb-head">
      <h3>Cities (15)</h3>
      <p>Click a city → click map to place pin</p>
    </div>
    <div class="city-list" id="cityList"></div>
    <div class="sb-foot">
      <button class="btn-apply" id="applyBtn" onclick="applyChanges()">Apply to Website →</button>
      <button class="btn-reset" onclick="resetAll()">↺ Reset to Saved</button>
    </div>
  </aside>

  <div class="map-area">
    <div class="map-wrap" id="mapWrap">
      <img src="/map" id="mapImg" alt="India Map" ondragstart="return false" onload="onImgLoad()">
      <div id="pins"></div>
      <div id="tooltip"></div>
      <div class="hint" id="hint">← Select a city first</div>
    </div>
  </div>
</div>

<script>
// ── Calibration (same as script.js) ─────────────────────────────────────────
const _M = { lngL:68.0, xL:7.5, lngR:97.4, xR:96.0, latT:37.0, yT:4.0, latB:8.0, yB:87.0 };

function toXY(lat, lng) {
    const x = _M.xL + (lng - _M.lngL) / (_M.lngR - _M.lngL) * (_M.xR - _M.xL);
    const y = _M.yT + (_M.latT - lat) / (_M.latT - _M.latB) * (_M.yB - _M.yT);
    return { x: +x.toFixed(3), y: +y.toFixed(3) };
}

function toLatLng(xPct, yPct) {
    const lng = _M.lngL + (xPct - _M.xL) / (_M.xR - _M.xL) * (_M.lngR - _M.lngL);
    const lat = _M.latT - (yPct - _M.yT) / (_M.yB - _M.yT) * (_M.latT - _M.latB);
    return { lat: +lat.toFixed(2), lng: +lng.toFixed(2) };
}

// ── State ────────────────────────────────────────────────────────────────────
let cities    = [];
let original  = [];
let selIdx    = -1;
let imgLoaded = false;

// ── Init ─────────────────────────────────────────────────────────────────────
async function loadCities() {
    try {
        const r = await fetch('/api/cities');
        cities   = await r.json();
        original = JSON.parse(JSON.stringify(cities));
        renderList();
        if (imgLoaded) renderPins();
    } catch(e) {
        setStatus('Error loading cities: ' + e.message, 'err');
    }
}

function onImgLoad() {
    imgLoaded = true;
    if (cities.length) renderPins();
}

// ── City list ─────────────────────────────────────────────────────────────────
function renderList() {
    document.getElementById('cityList').innerHTML = cities.map((c, i) => `
        <div class="city-item${i === selIdx ? ' sel' : ''}" onclick="selectCity(${i})">
            <div class="ci-dot"></div>
            <div>
                <div class="ci-name">${c.name}</div>
                <div class="ci-coords">${c.lat.toFixed(2)}°N, ${c.lng.toFixed(2)}°E</div>
            </div>
        </div>
    `).join('');
    // Scroll selected into view
    if (selIdx >= 0) {
        const items = document.querySelectorAll('.city-item');
        items[selIdx]?.scrollIntoView({ block: 'nearest' });
    }
}

// ── Pins ──────────────────────────────────────────────────────────────────────
function renderPins() {
    const layer = document.getElementById('pins');
    layer.innerHTML = cities.map((c, i) => {
        const { x, y } = toXY(c.lat, c.lng);
        const isSel    = i === selIdx;
        return `
            <div class="pin${isSel ? ' sel' : ''} lbl-${c.lbl}" style="left:${x}%;top:${y}%">
                <div class="pin-ring"></div>
                <div class="pin-dot"></div>
                <span class="pin-lbl">${c.name}</span>
            </div>`;
    }).join('');
}

// ── Select city ───────────────────────────────────────────────────────────────
function selectCity(i) {
    selIdx = i;
    document.getElementById('mapWrap').classList.add('mode-select');
    renderList();
    renderPins();
    setStatus(`Click on the map to place <strong>${cities[i].name}</strong>`);
    document.getElementById('hint').textContent = `📍 Click to place: ${cities[i].name}`;
}

// ── Map click ─────────────────────────────────────────────────────────────────
document.getElementById('mapImg').addEventListener('click', (e) => {
    if (selIdx === -1) return;
    const img  = e.currentTarget;
    const rect = img.getBoundingClientRect();
    const xPct = (e.clientX - rect.left) / rect.width  * 100;
    const yPct = (e.clientY - rect.top)  / rect.height * 100;
    const { lat, lng } = toLatLng(xPct, yPct);

    cities[selIdx].lat = lat;
    cities[selIdx].lng = lng;

    const name  = cities[selIdx].name;
    // Advance to next city automatically
    selIdx = (selIdx + 1) % cities.length;

    renderList();
    renderPins();
    setStatus(`✓ <strong>${name}</strong> → ${lat}°N, ${lng}°E &nbsp;|&nbsp; Next: <strong>${cities[selIdx].name}</strong>`);
    document.getElementById('hint').textContent = `📍 Click to place: ${cities[selIdx].name}`;
});

// ── Hover tooltip ─────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

document.getElementById('mapImg').addEventListener('mousemove', (e) => {
    if (selIdx === -1) { tooltip.style.display = 'none'; return; }
    const img  = e.currentTarget;
    const rect = img.getBoundingClientRect();
    const xPct = (e.clientX - rect.left) / rect.width  * 100;
    const yPct = (e.clientY - rect.top)  / rect.height * 100;
    const { lat, lng } = toLatLng(xPct, yPct);

    tooltip.textContent       = `${lat.toFixed(2)}°N,  ${lng.toFixed(2)}°E`;
    tooltip.style.left        = (e.clientX - rect.left + 14) + 'px';
    tooltip.style.top         = (e.clientY - rect.top  - 28) + 'px';
    tooltip.style.display     = 'block';
});

document.getElementById('mapImg').addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
});

// ── Apply ─────────────────────────────────────────────────────────────────────
async function applyChanges() {
    const btn = document.getElementById('applyBtn');
    btn.disabled = true;
    btn.textContent = 'Pushing to GitHub…';
    setStatus('Saving script.js and pushing to GitHub…', 'busy');
    try {
        const res  = await fetch('/api/save', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(cities)
        });
        const data = await res.json();
        if (data.ok) {
            setStatus('✓ ' + data.message, 'ok');
            original = JSON.parse(JSON.stringify(cities));
            btn.textContent = '✓ Done!';
            setTimeout(() => { btn.textContent = 'Apply to Website →'; btn.disabled = false; }, 3000);
        } else {
            setStatus('Error: ' + data.message, 'err');
            btn.textContent = 'Apply to Website →';
            btn.disabled = false;
        }
    } catch(e) {
        setStatus('Network error: ' + e.message, 'err');
        btn.textContent = 'Apply to Website →';
        btn.disabled = false;
    }
}

// ── Reset ─────────────────────────────────────────────────────────────────────
function resetAll() {
    if (!confirm('Reset all pins to last saved positions?')) return;
    cities = JSON.parse(JSON.stringify(original));
    selIdx = -1;
    document.getElementById('mapWrap').classList.remove('mode-select');
    document.getElementById('hint').textContent = '← Select a city first';
    renderList();
    renderPins();
    setStatus('Reset to saved positions.');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function setStatus(html, type = '') {
    const el = document.getElementById('status');
    el.innerHTML   = html;
    el.className   = 'hdr-status ' + type;
}

window.addEventListener('resize', () => { if (imgLoaded) renderPins(); });

// ── Boot ──────────────────────────────────────────────────────────────────────
loadCities();
</script>
</body>
</html>
